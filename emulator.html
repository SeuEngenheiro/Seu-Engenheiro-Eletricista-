<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emulador — Engenheiro Eletricista AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background: #e5ddd5; display: flex; flex-direction: column; align-items: center; }

  .frame {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column;
    background: #efeae2;
    box-shadow: 0 0 30px rgba(0,0,0,0.1);
  }

  header {
    background: #075e54; color: white;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  header .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #25d366; display: grid; place-items: center; font-size: 22px;
  }
  header .info { flex: 1; }
  header .info .name { font-weight: 600; font-size: 15px; }
  header .info .status { font-size: 12px; opacity: 0.9; }

  .controls {
    background: #f0f2f5;
    padding: 8px 12px; display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid #d1d7db;
  }
  .controls label { font-size: 12px; color: #54656f; font-weight: 600; }
  .controls select, .controls button {
    padding: 6px 10px; border: 1px solid #d1d7db; border-radius: 6px;
    background: white; font-size: 13px; cursor: pointer;
  }
  .controls button:hover { background: #f5f5f5; }
  .controls .phone { margin-left: auto; font-size: 11px; color: #667781; font-family: monospace; }

  .chat {
    flex: 1; overflow-y: auto;
    padding: 12px; display: flex; flex-direction: column; gap: 6px;
    background: #efeae2;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 1px, transparent 1px),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 1px, transparent 1px);
  }

  .msg {
    max-width: 80%; padding: 8px 12px; border-radius: 8px;
    font-size: 14px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    position: relative;
  }
  .msg .meta { display: block; font-size: 10px; color: #667781; margin-top: 4px; text-align: right; }
  .msg.user { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
  .msg.bot { background: white; align-self: flex-start; border-top-left-radius: 0; }
  .msg.system { background: #fff3cd; align-self: center; font-size: 12px; color: #664d03; text-align: center; max-width: 90%; }

  .typing { align-self: flex-start; padding: 10px 14px; background: white; border-radius: 8px; display: none; }
  .typing.active { display: block; }
  .typing span { display: inline-block; width: 6px; height: 6px; background: #999; border-radius: 50%; margin: 0 1px; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

  .composer {
    background: #f0f2f5;
    padding: 10px 12px; display: flex; gap: 8px;
    border-top: 1px solid #d1d7db;
  }
  .composer input {
    flex: 1; padding: 10px 14px; border: none; border-radius: 20px;
    background: white; font-size: 14px; outline: none;
  }
  .composer button {
    padding: 0 16px; border: none; border-radius: 50%;
    width: 42px; height: 42px;
    background: #00a884; color: white; font-size: 18px; cursor: pointer;
  }
  .composer button:disabled { background: #b0b0b0; cursor: not-allowed; }

  .markdown strong { font-weight: 600; }
  .markdown em { font-style: italic; }
  .markdown code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-family: monospace; font-size: 13px; }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="avatar">⚡</div>
    <div class="info">
      <div class="name">Engenheiro Eletricista AI</div>
      <div class="status" id="status">online</div>
    </div>
  </header>

  <div class="controls">
    <label for="plano">Plano:</label>
    <select id="plano">
      <option value="gratis">🆓 Grátis</option>
      <option value="pro">⚡ PRO</option>
      <option value="premium">👑 Premium</option>
    </select>
    <select id="demo">
      <option value="">🎬 Ver demo...</option>
      <optgroup label="── Modos novos (3 níveis) ──">
        <option value="modo1">🟢 Modo 1 — Cálculo completo</option>
        <option value="modo2">🔵 Modo 2 — Pergunta técnica</option>
        <option value="modo3">🟡 Modo 3 — Diagnóstico</option>
        <option value="modos_todos">▶ Mostrar os 3 modos</option>
      </optgroup>
      <optgroup label="── Modelo 4-seções (anterior) ──">
        <option value="calculo">1. Cálculo (motor)</option>
        <option value="pergunta">2. Pergunta (DR)</option>
        <option value="diagnostico">3. Diagnóstico (disjuntor)</option>
        <option value="conversao">4. Conversão (CV→kW)</option>
        <option value="material">5. Material (chuveiro)</option>
        <option value="boasvindas">6. Boas-vindas</option>
        <option value="todos">▶ Mostrar todos (4-seções)</option>
      </optgroup>
    </select>
    <button id="reset" title="Limpar conversa">🗑️ Limpar</button>
    <span class="phone" id="phoneLabel"></span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="typing" id="typing"><span></span><span></span><span></span></div>

  <form class="composer" id="form">
    <input id="input" type="text" placeholder="Digite uma mensagem..." autocomplete="off" />
    <button type="submit" id="send">➤</button>
  </form>
</div>

<script>
  // Telefone único por sessão do browser (persiste em localStorage)
  let telefone = localStorage.getItem('emul_phone');
  if (!telefone) {
    telefone = '+5511' + Math.floor(900000000 + Math.random() * 99999999);
    localStorage.setItem('emul_phone', telefone);
  }
  document.getElementById('phoneLabel').textContent = telefone;

  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const typing = document.getElementById('typing');
  const status = document.getElementById('status');
  const planoSel = document.getElementById('plano');
  const demoSel = document.getElementById('demo');
  const resetBtn = document.getElementById('reset');

  const DEMOS = {
    modo1: {
      user: 'calcula motor 10 CV 220V trifásico',
      bot: `🟢 *Motor 10 CV — 220 V trifásico*

📐 *Contexto técnico*
Motor de indução trifásico, pequeno porte. Em 220 V tri é viável até ~30 CV.

🧮 *Fórmula*
IB = P / (√3 × V × η × FP)

📊 *Cálculo*
Conversão: 10 × 736 = 7.360 W
Denominador: 1,732 × 220 × 0,9 × 0,8 = 274,4
IB = 7.360 / 274,4 ≈ 27 A

⚡ *Resultado*
IB = 27 A · cabo 6 mm² · disjuntor 32 A curva D

📋 *Norma*
NBR 5410 §6.2.6 (motores) · Tabela 36 (capacidade)

✅ *Verificações*
• Partida direta OK até 5 CV; acima, soft-starter
• Aterramento conforme NBR 5410 §6.4
• Queda de tensão na partida ≤ 4%

🔧 *Observações*
Assumi η=0,9 / FP=0,8 — confirme na placa.

*Caso queira mais detalhes, é só pedir.*`
    },
    modo2: {
      user: 'o que é DR?',
      bot: `🔵 *DR — Diferencial Residual*

✅ *Resposta direta*
Dispositivo que desarma em <40 ms quando detecta fuga ≥30 mA pra terra.

🛠️ *Justificativa técnica*
Compara corrente entrando vs. saindo do circuito. Se diferença ≥ IΔn, é fuga (geralmente pra terra) e o DR desarma protegendo contra choque.

📋 *Norma*
NBR 5410 §5.1.3.2.2 — obrigatório em áreas molhadas e tomadas externas.

💡 *Dica prática*
DR não substitui disjuntor — disjuntor → fios contra sobrecarga; DR → pessoas contra choque.

*Caso queira mais detalhes, é só pedir.*`
    },
    modo3: {
      user: 'disjuntor desarma quando ligo o chuveiro',
      bot: `🟡 *Disjuntor desarma com chuveiro*

🔍 *Possíveis causas*
• Sobrecarga (potência > capacidade do disjuntor)
• Cabo subdimensionado aquecendo
• Disjuntor envelhecido/desgastado
• Mau contato no terminal

🧪 *Testes rápidos*
1. Medir corrente com alicate amperímetro
2. Conferir bitola do cabo (mín. 6 mm² p/ 7500 W)
3. Apertar terminais (com circuito desligado)
4. Trocar disjuntor por novo de mesma amperagem

⚠️ *Riscos*
Cabo subdimensionado pode incendiar.
Aumentar disjuntor sem trocar cabo = bomba-relógio.

🔧 *Solução recomendada*
Se corrente OK e cabo OK → trocar disjuntor (envelhecimento).
Se corrente alta → conferir tensão do chuveiro (127/220 V correto?).
Se cabo fino → trocar cabo + manter disjuntor original.

*Caso queira mais detalhes, é só pedir.*`
    },
    calculo: {
      user: 'calcula motor 10 CV 220V trifásico',
      bot: `*Motor 10 CV — 220 V trifásico*

✅ *Resultado*
IB = 27 A · cabo 6 mm² · disjuntor 32 A curva D

🔧 *Solução*
Partida direta até 5 CV; acima, soft-starter ou estrela-triângulo.

⚠️ *Alerta*
Nunca aumente o disjuntor sem trocar o cabo junto.

📌 *Obs.:* assumi η=0,9 / FP=0,8 (típico — confirme na placa).

━━━━━━━━━━━━━━━━━━
1 → Ver Cálculo
2 → Ver Detalhes
3 → Ver Especificação Técnica
4 → Ver Material`
    },
    pergunta: {
      user: 'o que é DR?',
      bot: `*DR — Diferencial Residual*

✅ *Resultado*
Dispositivo que desarma em <40 ms com fuga ≥30 mA pra terra.

🔧 *Solução*
Instalar bipolar 30 mA na entrada de áreas molhadas e tomadas externas.

⚠️ *Alerta*
DR não substitui disjuntor — protegem coisas diferentes.

📌 *Obs.:* obrigatório pela NBR 5410 §5.1.3.2.2 desde 1997.

━━━━━━━━━━━━━━━━━━
1 → Ver Cálculo
2 → Ver Detalhes
3 → Ver Especificação Técnica
4 → Ver Material`
    },
    diagnostico: {
      user: 'disjuntor desarma quando ligo o chuveiro',
      bot: `*Disjuntor desarma com chuveiro*

✅ *Resultado*
Três hipóteses: sobrecarga, cabo subdimensionado ou disjuntor desgastado.

🔧 *Solução*
Medir corrente real, conferir bitola e amperagem do disjuntor.

⚠️ *Alerta*
Não troque o disjuntor por um maior antes de checar o cabo.

📌 *Obs.:* informe tensão (127/220 V) e potência do chuveiro p/ análise precisa.

━━━━━━━━━━━━━━━━━━
1 → Ver Cálculo
2 → Ver Detalhes
3 → Ver Especificação Técnica
4 → Ver Material`
    },
    conversao: {
      user: '10 cv em kw',
      bot: `*Conversão: 10 CV → kW*

✅ *Resultado*
10 CV = 7,36 kW

🔧 *Solução*
Multiplicar valor em CV por 0,736.

⚠️ *Alerta*
—

📌 *Obs.:* CV (métrico) ≠ HP imperial (1 CV = 0,9863 HP).

━━━━━━━━━━━━━━━━━━
1 → Ver Cálculo
2 → Ver Detalhes
3 → Ver Especificação Técnica
4 → Ver Material`
    },
    material: {
      user: 'materiais para chuveiro 7500W 220V',
      bot: `*Material — chuveiro 7500 W / 220 V*

✅ *Resultado*
Circuito exclusivo: cabo 6 mm² + disjuntor 40 A + DR 40 A 30 mA.

🔧 *Solução*
Ligação direta do quadro, sem emendas, com terra obrigatório.

⚠️ *Alerta*
Chuveiro sem aterramento = risco de morte por choque.

📌 *Obs.:* quantitativo de cabo varia com a distância — informe a metragem.

━━━━━━━━━━━━━━━━━━
1 → Ver Cálculo
2 → Ver Detalhes
3 → Ver Especificação Técnica
4 → Ver Material`
    },
    boasvindas: {
      user: 'oi',
      bot: `*SEU ENGENHEIRO AI*

✅ *Resultado*
Engenharia elétrica direto no zap.

🔧 *Solução*
Digite cálculo, dúvida, diagnóstico ou material.

⚠️ *Alerta*
Não substitui projeto técnico com ART quando exigido.

📌 *Obs.:* 20 perguntas/mês no plano grátis · upgrade p/ ilimitado.

━━━━━━━━━━━━━━━━━━
1 → Ver Cálculo
2 → Ver Detalhes
3 → Ver Especificação Técnica
4 → Ver Material`
    }
  };

  function renderDemo(key) {
    const d = DEMOS[key];
    if (!d) return;
    const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    addMsg(d.user, 'user', hora);
    addMsg(d.bot, 'bot', hora + ' · 🎬 demo');
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function renderMarkdown(s) {
    return escapeHtml(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<strong>$1</strong>')
      .replace(/_(.+?)_/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }
  function addMsg(text, who, meta) {
    const div = document.createElement('div');
    div.className = 'msg ' + who + (who !== 'system' ? ' markdown' : '');
    if (who === 'system') {
      div.textContent = text;
    } else {
      div.innerHTML = renderMarkdown(text);
      if (meta) {
        const m = document.createElement('span');
        m.className = 'meta';
        m.textContent = meta;
        div.appendChild(m);
      }
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  resetBtn.addEventListener('click', () => {
    if (!confirm('Limpar conversa? (gera novo telefone — histórico do agente também zera)')) return;
    localStorage.removeItem('emul_phone');
    location.reload();
  });

  demoSel.addEventListener('change', (e) => {
    const key = e.target.value;
    if (!key) return;
    if (key === 'todos') {
      ['calculo', 'pergunta', 'diagnostico', 'conversao', 'material', 'boasvindas'].forEach(renderDemo);
    } else if (key === 'modos_todos') {
      ['modo1', 'modo2', 'modo3'].forEach(renderDemo);
    } else {
      renderDemo(key);
    }
    e.target.value = '';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    send.disabled = true;
    addMsg(msg, 'user', new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }));
    typing.classList.add('active');
    status.textContent = 'digitando...';

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telefone, mensagem: msg, plano: planoSel.value })
      });
      const data = await r.json();
      typing.classList.remove('active');
      if (data.erro) {
        addMsg('❌ Erro: ' + data.erro, 'system');
      } else {
        const meta = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) + ' · ' + (data.ms / 1000).toFixed(1) + 's';
        addMsg(data.resposta, 'bot', meta);
      }
    } catch (err) {
      typing.classList.remove('active');
      addMsg('❌ Erro de rede: ' + err.message, 'system');
    } finally {
      status.textContent = 'online';
      send.disabled = false;
      input.focus();
    }
  });

  // Saudação automática ao abrir a conversa (primeiro acesso da sessão)
  const BOAS_VINDAS = `👷‍♂️⚡ Olá! Eu sou o SEU ENGENHEIRO AI

Posso te ajudar com qualquer dúvida ou problema elétrico, sempre seguindo as normas (NBR 5410 / NR-10).

O que você precisa?`;
  setTimeout(() => {
    const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    addMsg(BOAS_VINDAS, 'bot', hora);
  }, 300);

  input.focus();
</script>
</body>
</html>
